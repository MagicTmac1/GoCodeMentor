<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>用户登录 - GoCodeMentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(-45deg, #764ba2, #667eea, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .left-panel {
            flex: 1;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            background: rgba(0,0,0,0.4);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .left-panel h1 {
            font-size: 52px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .left-panel .slogan {
            font-size: 24px;
            line-height: 1.6;
            font-weight: 300;
        }

        .right-panel {
            flex: 1;
            padding: 60px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 35px;
            color: #333;
            font-size: 28px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        
        .form-group .icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .form-group select {
            padding-left: 14px; /* Select doesn't need icon padding */
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            margin-top: 12px;
            box-shadow: none;
        }
         .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0, 0.1);
        }

        .toggle-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }

        .toggle-link a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        
        .toggle-link a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h1>🎓 GoCodeMentor</h1>
            <p class="slogan">在这里，代码不再是冰冷的指令，<br>而是开启智慧的钥匙。<br>与AI同行，探索编程的无限可能。</p>
        </div>
        <div class="right-panel">
            <div class="login-box">
                <h2 id="formTitle">🔐 用户登录</h2>
                
                <div id="loginForm">
                    <div class="form-group">
                         <span class="icon">👤</span>
                        <input type="text" id="username" placeholder="用户名">
                    </div>
                    <div class="form-group">
                        <span class="icon">🔑</span>
                        <input type="password" id="password" placeholder="密码">
                    </div>
                    <button class="btn" onclick="login()">登录</button>
                </div>
                
                <div id="registerForm" class="hidden">
                    <div class="form-group">
                         <span class="icon">👤</span>
                        <input type="text" id="regUsername" placeholder="设置一个用户名">
                    </div>
                    <div class="form-group">
                        <span class="icon">🧑‍💻</span>
                        <input type="text" id="regName" placeholder="你的显示名称">
                    </div>
                    <div class="form-group">
                        <span class="icon">🔑</span>
                        <input type="password" id="regPassword" placeholder="设置密码">
                    </div>
                    <div class="form-group">
                        <select id="regRole">
                            <option value="student">我是学生</option>
                            <option value="teacher">我是教师</option>
                        </select>
                    </div>
                    <button class="btn" onclick="register()">立即注册</button>
                </div>
                
                <div class="toggle-link">
                    <span id="toggleText">还没有账号？</span>
                    <a onclick="toggleForm()" id="toggleLink">立即注册</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        localStorage.clear();
        
        let isLogin = true;

        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const formTitle = document.getElementById('formTitle');
        const toggleText = document.getElementById('toggleText');
        const toggleLink = document.getElementById('toggleLink');

        function toggleForm() {
            isLogin = !isLogin;
            loginForm.classList.toggle('hidden');
            registerForm.classList.toggle('hidden');
            
            if (isLogin) {
                formTitle.textContent = '🔐 用户登录';
                toggleText.textContent = '还没有账号？';
                toggleLink.textContent = '立即注册';
            } else {
                formTitle.textContent = '📝 新用户注册';
                toggleText.textContent = '已有账号？';
                toggleLink.textContent = '返回登录';
            }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('请填写用户名和密码');
                return;
            }
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await res.json();
                if (res.ok) {
                    sessionStorage.clear();
                    sessionStorage.setItem('user_id', data.id);
                    sessionStorage.setItem('user_name', data.name);
                    sessionStorage.setItem('user_role', data.role);
                    
                    document.cookie = `user_id=${data.id}; path=/`;
                    document.cookie = `user_role=${data.role}; path=/`;
                    document.cookie = `user_name=${data.name}; path=/`;
                    
                    window.location.replace('/');
                } else {
                    alert(data.error || '登录失败');
                }
            } catch (e) {
                alert('网络错误: ' + e.message);
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const name = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            
            if (!username || !name || !password) {
                alert('请填写所有注册信息');
                return;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, name, role})
                });
                
                const data = await res.json();
                if (res.ok) {
                    alert('注册成功！现在您可以登录了。');
                    toggleForm(); // Switch back to login form
                } else {
                    alert(data.error || '注册失败');
                }
            } catch (e) {
                alert('网络错误: ' + e.message);
            }
        }

        // Initial check to prevent logged-in users from seeing the login page
        (function checkLogin() {
            const userId = sessionStorage.getItem('user_id');
            const hasCookie = document.cookie.split(';').some(c => c.trim().startsWith('user_id='));
            
            if (userId && hasCookie) {
                window.location.replace('/');
            } else if (userId || hasCookie) {
                sessionStorage.clear();
                const pastDate = 'Thu, 01 Jan 1970 00:00:00 UTC';
                document.cookie = `user_id=; expires=${pastDate}; path=/;`;
                document.cookie = `user_role=; expires=${pastDate}; path=/;`;
                document.cookie = `user_name=; expires=${pastDate}; path=/;`;
            }
        })();
    </script>
</body>
</html>
