<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生工作台 - GoCodeMentor</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="/static/js/feedback.js"></script>
    <!-- 公共 CDN -->
    <script src="https://unpkg.com/marked@12.0.0/lib/marked.umd.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/styles/github.min.css">
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/languages/go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.3.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
      <div class="header">
        <div class="header-content">
            <h1>🎓 GoCodeMentor 学生工作台</h1>
            <div class="user-info">
                <span id="userName">加载中...</span>
                <button onclick="window.App.logout()">退出登录</button>
            </div>
        </div>
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="window.App.switchTab('course-details')">📖 课程详情</div>
            <div class="nav-tab" onclick="window.App.switchTab('wisdom-graph')">🧠 智慧图谱</div>
            <div class="nav-tab" onclick="window.App.switchTab('assignments')">📝 我的作业</div>
            <div class="nav-tab" onclick="goToChat()">🤖 AI 答疑</div>
            <div class="nav-tab" onclick="window.App.switchTab('feedback')">💡 意见反馈</div>
            <div class="nav-tab" onclick="window.App.switchTab('resources')">🚀 资源推荐</div>
        </div>
    </div>

    <div class="container">
        {{template "_course_details.html" .}}

        {{template "_wisdom_graph.html" .}}

        <!-- 作业列表 -->
        <div id="assignmentsSection" style="display: none;">
            <div class="section-title">
                <h2>我的作业</h2>
                <button class="btn" onclick="showAiSuggestions()">🤖 AI学习建议</button>
            </div>
            <div id="assignmentList" class="assignment-grid">
                <div class="empty-state">
                    <div class="icon">📝</div>
                    <p>正在加载作业...</p>
                </div>
            </div>

            <!-- AI 学习建议 -->
            <div id="aiSuggestionsSection" style="display: none; margin-top: 30px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);">
                <div class="section-title">
                    <h2>专业学习建议</h2>
                </div>
                <div id="aiSuggestionsContent">
                    <p>点击上方按钮，AI将根据你的作业完成情况，为你生成专属的学习建议。</p>
                </div>
            </div>
        </div>

        {{template "_feedback_section.html" .}}

        {{template "_resource_recommendations.html" .}}

    </div>

    <!-- 作业详情模态框 -->
    <div id="assignmentModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/student.js"></script>
</body>
</html>
