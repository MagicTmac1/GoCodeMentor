{{define "_resource_recommendations.html"}}
<div id="resourcesSection" style="display: none;">
    <div class="section-title">
        <h2>精选学习资源</h2>
        <button class="btn" onclick="showAddResourceModal()">+ 添加新资源</button>
    </div>
    <div class="resources-container-main">
        <div class="resources-sidebar">
            <a href="#" class="resources-sidebar-item active" onclick="switchResourceCategory(event, 'official')">🚀 Go官方核心</a>
            <a href="#" class="resources-sidebar-item" onclick="switchResourceCategory(event, 'practice')">🛠️ 实践与示例</a>
            <a href="#" class="resources-sidebar-item" onclick="switchResourceCategory(event, 'community')">📚 进阶与社区</a>
            <a href="#" class="resources-sidebar-item" onclick="switchResourceCategory(event, 'cs')">🎓 通用计算机</a>
        </div>

        <div class="resources-content-list">
            <div id="cat-official" class="resource-category-content active">
                <ul class="resource-list"></ul>
            </div>

            <div id="cat-practice" class="resource-category-content">
                <ul class="resource-list"></ul>
            </div>
            <div id="cat-community" class="resource-category-content">
                <ul class="resource-list"></ul>
            </div>
            <div id="cat-cs" class="resource-category-content">
                <ul class="resource-list"></ul>
            </div>
        </div>

         <div class="resources-leaderboard">
            <h3 class="leaderboard-title">🏆 资源推荐榜</h3>
            <div id="leaderboard-list">
                <p style="color: #999; font-size: 13px;">正在加载排行榜...</p>
            </div>
        </div>
    </div>

</div>
{{end}}
